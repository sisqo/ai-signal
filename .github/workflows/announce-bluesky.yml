name: Announce new articles on Bluesky

on:
  schedule:
    # Every 4 hours — publish dates are date-only (no time-of-day), so this just needs to run
    # at least once after midnight Europe/Rome, not at a precisely tuned minute.
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Announce new articles
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: node scripts/announce-bluesky.mjs

      - name: Record which articles were announced
        run: |
          if ! git diff --quiet data/bluesky-announced.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/bluesky-announced.json
            git commit -m "Record Bluesky announcements [skip ci] [vercel skip]"
            git push
          fi
